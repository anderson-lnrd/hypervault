@if (icon()) {
  <span class="material-icons hyper-chip-icon">{{ icon() }}</span>
}
@if (avatar()) {
  <span class="hyper-chip-avatar">{{ avatar() }}</span>
}
<span class="hyper-chip-label">
  @if (label()) {
    {{ label() }}
  } @else {
    <ng-content />
  }
</span>
@if (removable()) {
  <button class="hyper-chip-remove" aria-label="Remover" (click)="onRemove($event)" tabindex="-1">
    <span class="material-icons">close</span>
  </button>
}
